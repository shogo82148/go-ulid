on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.26"
          - "1.25"
          - "1.24"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: |
          go test -v ./...

  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-arch:
          - "amd64"
          - "386"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Run benchmarks
        env:
          GOARCH: ${{ matrix.go-arch }}
        run: |
          go test -bench=. -benchmem ./...
