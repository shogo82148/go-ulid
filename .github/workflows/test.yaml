on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.26"
          - "1.25"
          - "1.24"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: |
          go test -v ./...

  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-arch:
          - "amd64"
          - "386"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: stable
      - name: Run benchmarks
        env:
          GOARCH: ${{ matrix.go-arch }}
        run: |
          go test -bench=. -benchmem ./...
